name: Build Android Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      BUILD_TOOLS_VERSION: '33.0.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Android command line tools
        run: |
          sdk_root="$ANDROID_SDK_ROOT"
          mkdir -p "$sdk_root"
          cd "$RUNNER_TEMP"
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$sdk_root/cmdline-tools"
          mv "$sdk_root/cmdline-tools/cmdline-tools" "$sdk_root/cmdline-tools/latest" || true
          export PATH="$sdk_root/cmdline-tools/latest/bin:$PATH"
          yes | "$sdk_root/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$sdk_root" "platform-tools" "platforms;android-33" "build-tools;${BUILD_TOOLS_VERSION}"

      - name: Accept Android SDK licenses
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

      - name: Capacitor sync (copy web -> native)
        run: |
          npx cap sync android

      - name: Build Release (Gradle)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/*.apk

      - name: Sign release APK (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          APK_UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK_UNSIGNED" ]; then
            echo "Unsigned APK not found at $APK_UNSIGNED"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}/zipalign"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          ALIGNED_APK="${APK_UNSIGNED%.apk}-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release-signed.apk"
          "$ZIPALIGN" -v -p 4 "$APK_UNSIGNED" "$ALIGNED_APK"
          "$APKSIGNER" sign --ks release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KS_PASS" --key-pass pass:"$KEY_PASS" --out "$SIGNED_APK" "$ALIGNED_APK"
          ls -la "$SIGNED_APK"

      - name: Upload signed release APK (if created)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/app-release-signed.apk
