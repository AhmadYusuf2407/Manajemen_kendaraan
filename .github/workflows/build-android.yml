name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          npm ci

      - name: Ensure web assets present
        run: |
          # If you have a build script, replace this with `npm run build`
          ls -la public || true

      - name: Install Android command line tools
        run: |
          sdk_root="$ANDROID_SDK_ROOT"
          mkdir -p "$sdk_root"
          cd "$RUNNER_TEMP"
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$sdk_root/cmdline-tools"
          mv "$sdk_root/cmdline-tools/cmdline-tools" "$sdk_root/cmdline-tools/latest" || true
          export PATH="$sdk_root/cmdline-tools/latest/bin:$PATH"
          yes | "$sdk_root/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$sdk_root" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Accept Android SDK licenses
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true

      - name: Ensure Capacitor Android platform and sync
        run: |
          # If android native project isn't present, add the platform
          if [ ! -d android ]; then
            echo "Android folder not found — adding Capacitor Android platform"
            npx cap add android || true
          fi
          npx cap sync android

      - name: Ensure Gradle wrapper is executable
        run: |
          cd android
          chmod +x gradlew
          ls -la gradlew

      - name: Pre-download Gradle distribution (CI cache/workaround)
        run: |
          set -e
          DIST_VER=gradle-8.14.3-all.zip
          URL="https://services.gradle.org/distributions/${DIST_VER}"
          OUT="$RUNNER_TEMP/$DIST_VER"
          echo "Downloading $URL to $OUT"
          curl -sSfL "$URL" -o "$OUT"
          TARGET="$HOME/.gradle/wrapper/dists/gradle-8.14.3-all/manual"
          mkdir -p "$TARGET"
          unzip -q "$OUT" -d "$TARGET"
          echo "Extracted to $TARGET"
          ls -la "$TARGET"

      - name: Build Android (Gradle)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace --info --debug

      - name: Upload Gradle daemon logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-daemon-logs
          path: $HOME/.gradle/daemon/**/daemon-*.out.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
